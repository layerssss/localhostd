name: Build App
on:
  push:
    tags:
      - "v*"
jobs:
  build:
    name: Build on ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        node-version: [24.x]
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules for Electron
        run: npm run app_deps

      - name: Decode Apple API key (macOS tag builds only)
        if: runner.os == 'macOS'
        run: echo "$APPLE_API_KEY_P8" | base64 --decode > /tmp/apple_api_key.p8
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}

      - name: Build UI + app and publish release (version tag)
        run: npm run ui_build && npm run app_build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: /tmp/apple_api_key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Archive distributable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.snap
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.exe
